  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="index-en.html" class="nav-logo"><img src="HyStat.png" alt="HyStat" class="nav-logo-img"><span class="nav-logo-text">Hy<span class="nav-logo-bold">Stat</span></span></a>
      <button class="nav-toggle" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-menu">
        <li class="nav-dropdown">
          <a href="#">About Us</a>
          <ul class="dropdown-menu">
            <li><a href="mission-en.html">Mission / Vision / Values</a></li>
            <li><a href="company-en.html">Company</a></li>

        <li><a href="products-en.html">Services</a></li>
        <li><a href="news-en.html">News</a></li>

      <div class="lang-switcher">
        <span class="lang-label">LANGUAGE:</span>
        <a href="contact.html">JP</a>
        <span class="lang-divider">/</span>
        <a href="contact-en.html" class="lang-active">EN</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="section company-page">
      <div class="container">
        <h1 class="section-title">Contact</h1>
        <form class="contact-form" action="#" method="post">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="company">Company</label>
            <input type="text" id="company" name="company">
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>
          <button type="submit" class="btn">Submit</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 HyStat Co., Ltd. All rights reserved.</p>
  </footer>
