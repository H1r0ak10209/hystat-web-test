<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyStat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="dark-theme">
  <header class="header">
    <nav class="nav">
      <a href="#" class="nav-logo"><img src="/HyStat.png" alt="HyStat" class="nav-logo-img"><span class="nav-logo-text">Hy<span class="nav-logo-bold">Stat</span></span></a>
      <button class="nav-toggle" aria-label="メニューを開く">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-menu">
        <li class="nav-dropdown">
          <a href="#">私たちについて</a>
          <ul class="dropdown-menu">
            <li><a href="/mission/">ミッション・ビジョン・バリュー</a></li>
            <li><a href="/company/">会社概要</a></li>
            <li><a href="/team/">経営者紹介</a></li>
          </ul>
        </li>
        <li><a href="/products/">事業内容</a></li>
        <li><a href="/news/">お知らせ</a></li>
        <li><a href="/contact/">お問い合わせ</a></li>
      </ul>
      <div class="lang-switcher">
        <span class="lang-label">LANGUAGE:</span>
        <a href="/" class="lang-active">JP</a>
        <span class="lang-divider">/</span>
        <a href="/en/">EN</a>
      </div>
    </nav>
  </header>

  <main>
    <section id="home" class="hero">
      <div class="hero-slideshow">
        <div class="slide active" style="background-image: url('/images/hero/hero-slide1.jpg')"></div>
        <div class="slide" style="background-image: url('/images/hero/hero-slide2.jpg')"></div>
        <div class="slide" style="background-image: url('/images/hero/hero-slide3.jpg')"></div>
      </div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <p class="hero-tagline">不動産にテクノロジーを</p>
        <img src="/HyStat.png" alt="HyStat" class="hero-logo">
        <p class="hero-company">HyStat株式会社</p>
      </div>
    </section>

    <section id="products" class="section">
      <div class="container">
        <h2 class="section-title">プロダクト一覧</h2>
        <div class="under-construction">
          <p>Under Construction</p>
          <p class="under-construction-sub">準備中です</p>
        </div>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>&copy; 2026 HyStat Co., Ltd. All rights reserved.</p>
  </footer>

  <script src="/script.js"></script>
