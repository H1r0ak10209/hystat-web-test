<body>
  <header class="header">
    <nav class="nav">
      <a href="index.html" class="nav-logo"><img src="HyStat.png" alt="HyStat" class="nav-logo-img"><span class="nav-logo-text">Hy<span class="nav-logo-bold">Stat</span></span></a>
      <button class="nav-toggle" aria-label="メニューを開く">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-menu">
        <li class="nav-dropdown">
          <a href="#">私たちについて</a>
          <ul class="dropdown-menu">
            <li><a href="mission.html">ミッション・ビジョン・バリュー</a></li>
            <li><a href="company.html">会社概要</a></li>
            <li><a href="team.html">経営者紹介</a></li>
          </ul>
        </li>
        <li><a href="products.html">事業内容</a></li>
        <li><a href="news.html">お知らせ</a></li>
        <li><a href="contact.html">お問い合わせ</a></li>
      </ul>
      <div class="lang-switcher">
        <span class="lang-label">LANGUAGE:</span>
        <a href="contact.html" class="lang-active">JP</a>
        <span class="lang-divider">/</span>
        <a href="contact-en.html">EN</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="section company-page">
      <div class="container">
        <h1 class="section-title">お問い合わせ</h1>
        <form class="contact-form" action="#" method="post">
          <div class="form-group">
            <label for="name">お名前</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="company">会社名</label>
            <input type="text" id="company" name="company">
          </div>
          <div class="form-group">
            <label for="subject">件名</label>
            <input type="text" id="subject" name="subject" required>
          </div>
          <div class="form-group">
            <label for="message">お問い合わせ内容</label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>
          <button type="submit" class="btn">送信する</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 HyStat Co., Ltd. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
